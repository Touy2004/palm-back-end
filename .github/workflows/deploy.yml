name: Auto Deploy to Ubuntu Server

on:
  push:
    branches:
      - main # Triggers the workflow whenever you push to the 'main' branch

jobs:
  deploy:
    runs-on: self-hosted # This tells GitHub to run the script directly on your server!
    
    steps:
      - name: Deploy new code
        run: |
          # Navigate to the folder where your backend is stored
          # Change this path if your code is located somewhere else on your server!
          cd ~/dev/palm-back-end
          
          # Pull the latest code you just pushed
          git pull origin main
          
          # Restart the Docker containers with the new code
          docker-compose down
          docker-compose up -d --build
